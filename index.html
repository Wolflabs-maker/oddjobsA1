<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WOLF LABS: Odd Jobs</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- React & ReactDOM (Version 18) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel (Compiles JSX in the browser) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        wolf: {
                            dark: '#000000',      // Absolute Black (Spotify Premium)
                            card: '#121212',      // Dark Gray Card
                            border: '#282828',    // Subtle Border
                            primary: '#1ED760',   // Neon Green Accent
                            accent: '#ffffff'     // Crisp White
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-wolf-dark text-white overflow-hidden font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo } = React;

        // --- DATA SOURCE: 25 EXERCISES (LEVEL A1 - ODD JOBS & PRESENT SIMPLE 3RD PERSON) ---

        const JOB_DECODE = [
            { context: "Someone who helps sick patients in a hospital or clinic.", q: "Identify the profession:", answer: "Doctor", options: ["Teacher", "Doctor", "Driver", "Builder"] },
            { context: "Someone who builds houses, buildings, and structures.", q: "Identify the profession:", answer: "Builder", options: ["Mechanic", "Builder", "Doctor", "Teacher"] },
            { context: "Someone who fixes broken cars and engines.", q: "Identify the profession:", answer: "Mechanic", options: ["Driver", "Mechanic", "Builder", "Engineer"] },
            { context: "Someone who drives a bus, taxi, or truck all day.", q: "Identify the profession:", answer: "Driver", options: ["Doctor", "Teacher", "Driver", "Mechanic"] },
            { context: "Someone who teaches students in a school or university.", q: "Identify the profession:", answer: "Teacher", options: ["Teacher", "Builder", "Driver", "Doctor"] }
        ];

        const S_PROTOCOL_MATRIX = [
            { context: "Add the correct 3rd person ending to 'help'.", q: "A doctor ___ patients.", answer: "helps", options: ["help", "helps", "helping", "to help"] },
            { context: "Add the correct 3rd person ending to 'fix'.", q: "A mechanic ___ cars.", answer: "fixes", options: ["fix", "fixs", "fixes", "fixing"] },
            { context: "Add the correct 3rd person ending to 'teach'.", q: "A teacher ___ students.", answer: "teaches", options: ["teach", "teachs", "teaches", "teaching"] },
            { context: "Add the correct 3rd person ending to 'build'.", q: "An engineer ___ houses.", answer: "builds", options: ["build", "builds", "building", "to build"] },
            { context: "Add the correct 3rd person ending to 'drive'.", q: "She is a driver. She ___ a bus.", answer: "drives", options: ["drive", "drives", "driving", "to drive"] }
        ];

        const NEGATIVE_DRILL = [
            { context: "Use the negative form for 3rd person singular.", q: "A doctor ___ drive a bus.", answer: "doesn't", options: ["don't", "doesn't", "isn't", "aren't"] },
            { context: "Choose the correct base verb after 'doesn't'.", q: "He is a teacher. He doesn't ___ cars.", answer: "fix", options: ["fixes", "fixing", "fix", "fixed"] },
            { context: "Use the negative form to describe a mechanic.", q: "A mechanic doesn't ___ in a hospital.", answer: "work", options: ["works", "working", "work", "worked"] },
            { context: "Complete the negative sentence about a driver.", q: "She is a driver. She ___ build houses.", answer: "doesn't", options: ["don't", "isn't", "doesn't", "not"] },
            { context: "Use the negative form to describe a builder.", q: "A builder ___ teach students.", answer: "doesn't", options: ["doesn't", "don't", "isn't", "aren't"] }
        ];

        const CAREER_INTERVIEW_LOG = [
            {
                text: "Initiating the interview:\n- What (1) ____ your father do?",
                blanks: [
                    { id: 1, correct: "does", options: ["do", "does", "is"] }
                ]
            },
            {
                text: "Stating the profession:\n- He (1) ____ a mechanic.",
                blanks: [
                    { id: 1, correct: "is", options: ["is", "does", "has"] }
                ]
            },
            {
                text: "Describing the responsibilities:\n- Oh, cool! He (1) ____ cars every day.",
                blanks: [
                    { id: 1, correct: "fixes", options: ["fix", "fixes", "fixing"] }
                ]
            },
            {
                text: "Discussing negative preferences:\n- Does he like it? Yes, but he (1) ____ like working on weekends.",
                blanks: [
                    { id: 1, correct: "doesn't", options: ["don't", "doesn't", "isn't"] }
                ]
            },
            {
                text: "Concluding the evaluation:\n- I understand. It is a very (1) ____ job!",
                blanks: [
                    { id: 1, correct: "hard", options: ["hard", "easy", "simple"] }
                ]
            }
        ];

        const VOCAL_MISSION = [
            { title: "The Hard Job", context: "Explain why a specific profession is difficult using 'because'.", starter: "I think a doctor is hard because..." },
            { title: "The Easy Job", context: "Explain why a specific profession is relaxing or simple.", starter: "A [job] is easy because..." },
            { title: "Action Description", context: "Describe what a teacher does every day.", starter: "A teacher teaches..." },
            { title: "Mechanic Action", context: "Describe what a mechanic does.", starter: "A mechanic fixes..." },
            { title: "Family Profession", context: "Share the profession of a family member.", starter: "My father/mother is an engineer. He/She builds..." }
        ];

        const LAB_DATA = [
            { id: "ACT-01", title: "Career Decode", icon: "fas fa-briefcase", description: "Identify professions through their responsibilities and context.", tracks: JOB_DECODE, type: "decoder" },
            { id: "ACT-02", title: "The +S Protocol", icon: "fas fa-cogs", description: "Master the 3rd Person Singular ending (s/es) in Present Simple.", tracks: S_PROTOCOL_MATRIX, type: "decoder" },
            { id: "ACT-03", title: "Negative Matrix", icon: "fas fa-ban", description: "Learn to use 'doesn't + base verb' to describe what people do not do.", tracks: NEGATIVE_DRILL, type: "decoder" },
            { id: "ACT-04", title: "Interview Log", icon: "fas fa-comments", description: "Reconstruct a real-world dialogue about someone's job.", tracks: CAREER_INTERVIEW_LOG, type: "cloze" },
            { id: "ACT-05", title: "Speaking Arena", icon: "fas fa-microphone-alt", description: "Argue why a job is hard or easy and describe family professions!", tracks: VOCAL_MISSION, type: "speaking" }
        ];

        // --- MAIN COMPONENT ---

        function App() {
            const [view, setView] = useState('home'); 
            const [activeActIndex, setActiveActIndex] = useState(0);
            const [currentStep, setCurrentStep] = useState(0);
            const [score, setScore] = useState(0);
            
            const [selectedAnswer, setSelectedAnswer] = useState(null);
            const [clozeSelections, setClozeSelections] = useState({});
            const [isAnswerVerified, setIsAnswerVerified] = useState(false);
            const [isRecording, setIsRecording] = useState(false);
            const [isProcessing, setIsProcessing] = useState(false);
            const [toast, setToast] = useState({ show: false, msg: '', type: 'success' });

            const activeActivity = useMemo(() => LAB_DATA[activeActIndex], [activeActIndex]);
            const currentTrack = useMemo(() => activeActivity?.tracks[currentStep], [activeActivity, currentStep]);

            const showToast = (msg, type = 'success') => {
                setToast({ show: true, msg, type });
                setTimeout(() => setToast({ show: false, msg: '', type: 'success' }), 2500);
            };

            const startExercise = (index) => {
                setActiveActIndex(index);
                setCurrentStep(0);
                resetState();
                setView('exercise');
            };

            const resetState = () => {
                setSelectedAnswer(null);
                setClozeSelections({});
                setIsAnswerVerified(false);
                setIsRecording(false);
                setIsProcessing(false);
            };

            const verifyAnswer = () => {
                if (activeActivity.type === 'decoder') {
                    if (selectedAnswer === currentTrack.answer) {
                        setScore(s => s + 100);
                        showToast("DATA VERIFIED! +100 XP", 'success');
                        setIsAnswerVerified(true);
                    } else {
                        showToast("SYNTAX OVERRIDE FAILED. TRY AGAIN.", 'error');
                    }
                } else if (activeActivity.type === 'cloze') {
                    const isCorrect = currentTrack.blanks.every(b => clozeSelections[b.id] === b.correct);
                    if (isCorrect) {
                        setScore(s => s + 200);
                        showToast("INTERVIEW SUCCESSFUL! +200 XP", 'success');
                        setIsAnswerVerified(true);
                    } else {
                        showToast("LOGIC ERROR DETECTED IN LOG.", 'error');
                    }
                } else {
                    setIsProcessing(true);
                    setTimeout(() => {
                        setIsProcessing(false);
                        setScore(s => s + 300);
                        showToast("AUDIO FREQUENCY SYNCED! +300 XP", 'success');
                        setIsAnswerVerified(true);
                    }, 1500);
                }
            };

            const nextStep = () => {
                if (currentStep + 1 < activeActivity.tracks.length) {
                    setCurrentStep(s => s + 1);
                    resetState();
                } else {
                    setView('completion');
                }
            };

            return (
                <div className="min-h-screen font-sans bg-wolf-dark text-white selection:bg-wolf-primary/30">
                    {/* SPOTIFY DARK PREMIUM BACKGROUND */}
                    <div className="fixed inset-0 pointer-events-none z-0 overflow-hidden">
                        <div className="absolute top-[-20%] left-[-10%] w-[60%] h-[60%] bg-wolf-primary/10 blur-[180px] rounded-full"></div>
                        <div className="absolute bottom-[-20%] right-[-10%] w-[50%] h-[50%] bg-wolf-primary/5 blur-[150px] rounded-full"></div>
                        <div className="absolute inset-0 bg-[url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMjAiIGhlaWdodD0iMjAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PGNpcmNsZSBjeD0iMSIgY3k9IjEiIHI9IjEiIGZpbGw9InJnYmEoMjU1LDI1NSwyNTUsMC4wMykiLz48L3N2Zz4=')] opacity-10"></div>
                    </div>

                    <div className="flex h-screen relative z-10">
                        {/* SIDEBAR */}
                        <aside className="w-72 bg-wolf-card/90 backdrop-blur-xl border-r border-wolf-border flex flex-col justify-between hidden md:flex h-full shadow-[5px_0_30px_rgba(0,0,0,0.8)] z-20">
                            <div>
                                <div className="p-8 border-b border-wolf-border">
                                    <h1 className="text-3xl font-black tracking-tighter flex items-center gap-3 text-white">
                                        <i className="fas fa-layer-group text-wolf-primary"></i> WOLF LABS
                                    </h1>
                                    <p className="text-[10px] font-bold text-wolf-primary uppercase tracking-[0.2em] mt-2">Language Engineering</p>
                                </div>
                                <nav className="px-4 space-y-2 mt-6 text-left">
                                    <button onClick={() => view !== 'home' && setView('home')} className={`w-full flex items-center gap-4 px-4 py-3 font-bold rounded-xl transition-all ${view === 'home' || view === 'completion' ? 'bg-wolf-primary/10 text-white border border-wolf-primary/30' : 'text-gray-500 hover:text-white hover:bg-white/5'}`}>
                                        <i className={`fas fa-home ${view === 'home' ? "text-wolf-primary" : ""}`}></i>
                                        System Hub
                                    </button>
                                    <button className="w-full flex items-center gap-4 px-4 py-3 font-bold text-gray-500 hover:text-white rounded-xl hover:bg-white/5 transition-all">
                                        <i className="fas fa-chart-line"></i>
                                        Fluency Metrics
                                    </button>
                                </nav>
                            </div>
                            <div className="p-4 border-t border-wolf-border">
                                <div className="bg-white/5 border border-white/10 rounded-2xl p-4 flex items-center gap-4 hover:border-wolf-primary/50 transition-all cursor-pointer">
                                    <div className="w-10 h-10 rounded-full bg-wolf-primary flex items-center justify-center text-black font-black shadow-[0_0_15px_rgba(30,215,96,0.4)]">
                                        <i className="fas fa-user-ninja"></i>
                                    </div>
                                    <div className="flex-1 overflow-hidden text-left">
                                        <p className="text-sm font-bold text-white truncate">Agent_A1</p>
                                        <p className="text-[10px] text-gray-400 font-bold uppercase tracking-wider">Module: Odd Jobs</p>
                                    </div>
                                </div>
                            </div>
                        </aside>

                        {/* MAIN AREA */}
                        <main className="flex-1 flex flex-col bg-transparent relative overflow-hidden h-full">
                            
                            {/* HOME PAGE */}
                            {view === 'home' && (
                                <div className="flex-1 overflow-y-auto p-8 lg:p-12 animate-in fade-in duration-700">
                                    <header className="flex flex-col md:flex-row justify-between items-start md:items-end mb-12 gap-6 text-left">
                                        <div>
                                            <p className="text-wolf-primary font-bold tracking-widest uppercase text-xs mb-3 flex items-center gap-2">
                                                <i className="fas fa-circle text-[8px] animate-pulse"></i> A1 PROTOCOL ACTIVE
                                            </p>
                                            <h2 className="text-5xl md:text-6xl font-black tracking-tight text-white mb-4 drop-shadow-lg">Odd Jobs</h2>
                                            <p className="text-gray-400 text-lg max-w-2xl leading-relaxed">Expand your professional vocabulary and master the 3rd Person Singular (he/she + verb + s/es) in the Present Simple.</p>
                                        </div>
                                        <div className="bg-wolf-card/50 backdrop-blur-md border border-wolf-border rounded-2xl px-8 py-6 text-center min-w-[180px] shadow-lg relative overflow-hidden">
                                            <div className="absolute top-0 left-0 w-full h-1 bg-wolf-primary"></div>
                                            <p className="text-xs text-gray-500 uppercase tracking-[0.2em] mb-1 font-bold">Neural XP</p>
                                            <p className="text-4xl font-black text-white">{score}</p>
                                        </div>
                                    </header>
                                    
                                    <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-5 gap-6 pb-20">
                                        {LAB_DATA.map((act, idx) => (
                                            <div key={act.id} onClick={() => startExercise(idx)} className="group bg-wolf-card border border-wolf-border hover:border-wolf-primary/80 hover:-translate-y-2 rounded-3xl p-6 transition-all duration-300 cursor-pointer relative overflow-hidden flex flex-col justify-between min-h-[260px] shadow-lg">
                                                <div className="absolute top-[-50px] right-[-50px] w-32 h-32 bg-wolf-primary/10 rounded-full blur-2xl group-hover:bg-wolf-primary/20 transition-all"></div>
                                                <div className="relative z-10 text-left">
                                                    <div className="w-12 h-12 rounded-2xl bg-white/5 flex items-center justify-center text-wolf-primary group-hover:bg-wolf-primary group-hover:text-black mb-6 transition-all text-xl shadow-md group-hover:shadow-[0_0_20px_rgba(30,215,96,0.6)]">
                                                        <i className={act.icon}></i>
                                                    </div>
                                                    <h3 className="text-xl font-bold mb-2 text-white">{act.title}</h3>
                                                    <p className="text-xs text-gray-400 leading-relaxed">{act.description}</p>
                                                </div>
                                                <div className="flex justify-between items-center text-[9px] font-bold text-gray-500 uppercase tracking-widest border-t border-wolf-border pt-4 mt-6">
                                                    <span><i className="fas fa-layer-group mr-1"></i> {act.tracks.length} Stages</span>
                                                    <span className="text-wolf-primary">A1 Level</span>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {/* EXERCISE SCREEN */}
                            {view === 'exercise' && (
                                <div className="flex-1 flex flex-col h-full animate-in fade-in duration-500">
                                    <header className="p-6 border-b border-wolf-border bg-wolf-card/90 backdrop-blur-xl flex items-center justify-between z-20">
                                        <div className="flex items-center gap-6 w-1/3 text-left">
                                            <button onClick={() => setView('home')} className="w-10 h-10 rounded-full bg-white/5 border border-white/10 flex items-center justify-center text-gray-400 hover:text-black hover:border-wolf-primary hover:bg-wolf-primary transition-all">
                                                <i className="fas fa-arrow-left"></i>
                                            </button>
                                            <div className="hidden sm:block">
                                                <p className="text-[10px] text-wolf-primary uppercase tracking-[0.2em] font-bold">{activeActivity.id}</p>
                                                <p className="font-bold text-sm text-white">{activeActivity.title}</p>
                                            </div>
                                        </div>

                                        <div className="w-1/3 flex flex-col items-center">
                                            <div className="flex justify-between w-full max-w-[250px] text-[10px] text-gray-500 mb-2 font-bold uppercase tracking-widest">
                                                <span>Phase 0{currentStep + 1} of 0{activeActivity.tracks.length}</span>
                                            </div>
                                            <div className="w-full max-w-[250px] h-2 bg-white/5 rounded-full overflow-hidden">
                                                <div className="h-full bg-wolf-primary transition-all duration-700 ease-out shadow-[0_0_10px_rgba(30,215,96,0.5)]" style={{ width: `${((currentStep + 1) / activeActivity.tracks.length) * 100}%` }}></div>
                                            </div>
                                        </div>

                                        <div className="w-1/3 text-right">
                                            <span className="bg-white/5 border border-white/10 px-4 py-2 rounded-full text-[10px] font-bold text-gray-400 uppercase tracking-widest">
                                                XP: <span className="text-wolf-primary ml-1">{score}</span>
                                            </span>
                                        </div>
                                    </header>

                                    <div className="flex-1 overflow-y-auto flex flex-col justify-center p-6 pb-40 relative z-10">
                                        <div className="w-full flex justify-center">
                                            
                                            {/* MULTIPLE CHOICE */}
                                            {activeActivity.type === 'decoder' && (
                                                <div className="w-full max-w-4xl flex flex-col items-center gap-10">
                                                    <div className="flex flex-col md:flex-row gap-6 w-full">
                                                        <div className="flex-1 bg-white/5 border border-white/10 rounded-3xl p-8 text-left relative overflow-hidden backdrop-blur-sm">
                                                            <p className="text-wolf-primary font-bold text-[10px] uppercase mb-4 tracking-[0.2em] flex items-center gap-2"><i className="fas fa-radar"></i> Context Scan</p>
                                                            <h2 className="text-xl sm:text-2xl font-medium text-gray-300 leading-relaxed">{currentTrack.context}</h2>
                                                        </div>
                                                        <div className="flex-1 bg-wolf-card border border-wolf-border rounded-3xl p-8 text-left shadow-lg">
                                                            <p className="text-gray-400 font-bold text-[10px] uppercase mb-4 tracking-[0.2em] flex items-center gap-2"><i className="fas fa-crosshairs"></i> Target Input</p>
                                                            <h2 className="text-2xl sm:text-3xl font-bold text-white leading-relaxed">
                                                                {currentTrack.q.replace('___', selectedAnswer || '____')}
                                                            </h2>
                                                        </div>
                                                    </div>
                                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 w-full">
                                                        {currentTrack.options.map(opt => (
                                                            <button key={opt} onClick={() => !isAnswerVerified && setSelectedAnswer(opt)} className={`p-6 rounded-2xl font-bold uppercase tracking-wider transition-all border-2 text-sm sm:text-base ${selectedAnswer === opt ? 'bg-wolf-primary border-wolf-primary text-black shadow-[0_0_20px_rgba(30,215,96,0.4)]' : 'bg-black/50 border-white/10 text-gray-300 hover:text-white hover:border-wolf-primary/50'}`}>
                                                                {opt}
                                                            </button>
                                                        ))}
                                                    </div>
                                                </div>
                                            )}

                                            {/* FILL IN THE BLANKS (CLOZE) */}
                                            {activeActivity.type === 'cloze' && (
                                                <div className="w-full max-w-4xl bg-wolf-card border border-wolf-border rounded-3xl p-10 shadow-2xl text-left relative overflow-hidden">
                                                    <div className="absolute top-0 right-0 w-64 h-64 bg-wolf-primary/5 rounded-full blur-3xl"></div>
                                                    <p className="text-wolf-primary font-bold text-[10px] uppercase mb-8 tracking-[0.2em] flex items-center gap-2"><i className="fas fa-comments"></i> Social Interaction Log</p>
                                                    
                                                    <p className="text-gray-400 mb-6 text-sm sm:text-base italic">{currentTrack.text.split('\n')[0]}</p>
                                                    
                                                    <div className="text-2xl sm:text-4xl font-bold leading-[3.5rem] sm:leading-[5rem] text-white">
                                                        {currentTrack.text.split('\n')[1].split(/(\(\d\)\s____)/).map((part, i) => {
                                                            const match = part.match(/\((\d)\)\s____/);
                                                            if (match) {
                                                                const blankId = parseInt(match[1]);
                                                                const blank = currentTrack.blanks.find(b => b.id === blankId);
                                                                return (
                                                                    <span key={i} className="inline-flex mx-3 relative group">
                                                                        <select value={clozeSelections[blankId] || ""} onChange={(e) => setClozeSelections({...clozeSelections, [blankId]: e.target.value})} disabled={isAnswerVerified} className={`appearance-none bg-wolf-dark border-b-4 px-4 sm:px-6 py-2 rounded-lg focus:outline-none transition-all font-black text-xl sm:text-3xl cursor-pointer ${clozeSelections[blankId] ? 'border-wolf-primary text-wolf-primary bg-wolf-primary/10' : 'border-gray-600 text-gray-400 hover:border-gray-300'}`}>
                                                                            <option value="" disabled>---</option>
                                                                            {blank.options.map(o => <option key={o} value={o}>{o}</option>)}
                                                                        </select>
                                                                        <i className="fas fa-chevron-down absolute right-3 top-1/2 transform -translate-y-1/2 text-xs text-gray-500 pointer-events-none"></i>
                                                                    </span>
                                                                );
                                                            }
                                                            return <span key={i}>{part}</span>;
                                                        })}
                                                    </div>
                                                </div>
                                            )}

                                            {/* VOCAL PRACTICE */}
                                            {activeActivity.type === 'speaking' && (
                                                <div className="w-full max-w-3xl flex flex-col items-center">
                                                    <div className="w-full bg-wolf-card border border-wolf-border rounded-3xl p-8 sm:p-12 mb-10 text-center shadow-2xl relative overflow-hidden">
                                                        <div className="absolute top-[-50px] left-[-50px] w-40 h-40 bg-wolf-primary/10 rounded-full blur-3xl"></div>
                                                        <p className="text-[10px] text-wolf-primary uppercase font-bold mb-6 tracking-[0.2em] flex items-center justify-center gap-2"><i className="fas fa-volume-up"></i> {currentTrack.title}</p>
                                                        <h2 className="text-xl sm:text-2xl font-medium text-gray-300 mb-10 leading-relaxed text-left">{currentTrack.context}</h2>
                                                        <div className="bg-black/40 p-6 sm:p-8 rounded-2xl border border-white/5 text-left w-full border-l-4 border-l-wolf-primary">
                                                            <p className="text-[10px] text-gray-500 uppercase font-bold mb-3 tracking-widest">Speaking Starter:</p>
                                                            <p className="text-2xl sm:text-4xl font-black text-white italic leading-snug">"{currentTrack.starter}"</p>
                                                        </div>
                                                    </div>
                                                    <div className="flex flex-col items-center gap-6">
                                                        <button onClick={() => !isAnswerVerified && setIsRecording(!isRecording)} className={`w-28 h-28 sm:w-32 sm:h-32 rounded-full flex items-center justify-center transition-all duration-300 ${isRecording ? 'bg-red-500 animate-pulse shadow-[0_0_50px_rgba(239,68,68,0.5)] scale-110 text-white' : isAnswerVerified ? 'bg-wolf-primary text-black shadow-[0_0_30px_rgba(30,215,96,0.4)]' : 'bg-wolf-dark border-4 border-wolf-primary text-wolf-primary hover:scale-105 hover:bg-wolf-primary/10'} text-4xl sm:text-5xl`}>
                                                            {isProcessing ? <i className="fas fa-circle-notch fa-spin"></i> : isAnswerVerified ? <i className="fas fa-check"></i> : <i className="fas fa-microphone"></i>}
                                                        </button>
                                                        <p className={`text-[10px] sm:text-xs font-bold tracking-[0.2em] uppercase ${isRecording ? 'text-red-400' : 'text-gray-500'}`}>{isRecording ? 'Recording Audio...' : isProcessing ? 'Analyzing Syntax...' : isAnswerVerified ? 'Signal Verified' : 'Hold to Speak'}</p>
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    </div>

                                    {/* BOTTOM ACTION BAR */}
                                    <div className="absolute bottom-0 w-full p-6 sm:p-8 bg-gradient-to-t from-[#000000] via-[#000000] to-transparent flex justify-center pb-8 sm:pb-12 z-40">
                                        {!isAnswerVerified ? (
                                            <button onClick={verifyAnswer} disabled={(!selectedAnswer && Object.keys(clozeSelections).length === 0 && !isRecording) || isProcessing} className="w-full max-w-lg py-5 sm:py-6 rounded-full bg-wolf-primary text-black font-black uppercase tracking-[0.2em] text-sm sm:text-base flex items-center justify-center gap-3 transition-all hover:bg-[#1ed760]/80 disabled:opacity-30 disabled:hover:opacity-30 shadow-[0_10px_30px_rgba(30,215,96,0.2)] hover:scale-[1.02] hover:shadow-[0_10px_40px_rgba(30,215,96,0.4)]">
                                                Verify Sequence <i className="fas fa-shield-alt"></i>
                                            </button>
                                        ) : (
                                            <button onClick={nextStep} className="w-full max-w-lg py-5 sm:py-6 rounded-full bg-white text-wolf-dark font-black uppercase tracking-[0.2em] text-sm sm:text-base flex items-center justify-center gap-3 transition-all hover:bg-gray-200 hover:scale-[1.02] shadow-[0_10px_30px_rgba(255,255,255,0.2)]">
                                                Next Sequence <i className="fas fa-forward"></i>
                                            </button>
                                        )}
                                    </div>
                                </div>
                            )}

                            {/* COMPLETION SCREEN */}
                            {view === 'completion' && (
                                <div className="flex-1 flex flex-col items-center justify-center relative p-6 text-center animate-in zoom-in-95 duration-700">
                                    <div className="absolute inset-0 bg-[radial-gradient(circle_at_center,rgba(30,215,96,0.15)_0%,transparent_70%)] pointer-events-none"></div>
                                    <div className="relative z-10 max-w-2xl w-full">
                                        <div className="w-24 h-24 sm:w-32 sm:h-32 mx-auto rounded-full bg-wolf-primary/20 border-4 border-wolf-primary flex items-center justify-center mb-8 sm:mb-10 shadow-[0_0_50px_rgba(30,215,96,0.5)] text-4xl sm:text-6xl text-wolf-primary">
                                            <i className="fas fa-briefcase"></i>
                                        </div>
                                        <h1 className="text-4xl sm:text-6xl font-black mb-4 sm:mb-6 tracking-tighter uppercase text-white drop-shadow-lg">Career Master!</h1>
                                        <p className="text-lg sm:text-2xl text-gray-400 mb-10 sm:mb-12 max-w-xl mx-auto leading-relaxed">System Optimization Complete. You have successfully mastered job vocabulary and the 3rd Person Singular in the Present Simple.</p>
                                        <div className="bg-wolf-card border border-wolf-border rounded-3xl p-8 sm:p-10 mb-10 sm:mb-12 flex justify-around shadow-2xl relative overflow-hidden">
                                            <div className="absolute top-0 left-0 w-1 h-full bg-wolf-primary"></div>
                                            <div className="text-center">
                                                <p className="text-[10px] sm:text-xs text-gray-500 uppercase tracking-[0.2em] mb-2 sm:mb-3 font-bold">Total Neural XP</p>
                                                <p className="text-4xl sm:text-5xl font-black text-wolf-primary">+{score}</p>
                                            </div>
                                            <div className="w-px bg-wolf-border"></div>
                                            <div className="text-center">
                                                <p className="text-[10px] sm:text-xs text-gray-500 uppercase tracking-[0.2em] mb-2 sm:mb-3 font-bold">Fluency Lock</p>
                                                <p className="text-4xl sm:text-5xl font-black text-white">A1</p>
                                            </div>
                                        </div>
                                        <button onClick={() => setView('home')} className="w-full sm:w-auto px-12 py-5 sm:py-6 rounded-full bg-white/5 text-white font-black uppercase tracking-[0.2em] text-sm sm:text-base hover:bg-wolf-primary hover:text-black transition-all border border-white/10 hover:border-wolf-primary hover:shadow-[0_0_30px_rgba(30,215,96,0.3)]">Return to System Hub</button>
                                    </div>
                                </div>
                            )}
                        </main>
                    </div>

                    {/* TOAST NOTIFICATIONS */}
                    <div className={`fixed top-8 left-1/2 transform -translate-x-1/2 px-6 sm:px-10 py-4 sm:py-5 rounded-2xl sm:rounded-3xl font-bold shadow-[0_10px_40px_rgba(0,0,0,0.8)] transition-all duration-300 z-[100] flex items-center gap-3 sm:gap-4 border ${toast.show ? 'opacity-100 translate-y-0' : 'opacity-0 -translate-y-10 pointer-events-none'} ${toast.type === 'success' ? 'bg-wolf-card text-white border-wolf-primary' : 'bg-red-900 text-white border-red-500'}`}>
                        {toast.type === 'success' ? <i className="fas fa-check-circle text-wolf-primary text-xl sm:text-2xl"></i> : <i className="fas fa-exclamation-triangle text-red-400 text-xl sm:text-2xl"></i>}
                        <span className="text-sm sm:text-lg uppercase tracking-[0.1em] sm:tracking-widest font-black">{toast.msg}</span>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
